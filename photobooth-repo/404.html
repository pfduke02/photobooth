     so a missing asset path returns a real 404 instead of index.html with 200.
     (That fallback once let browsers cache HTML as an "immutable" model script.) -->

<style>body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:#0a0b10;color:#f3f4f8;display:flex;min-height:100vh;align-items:center;justify-content:center;margin:0}
a{color:#c98a6b}</style></head>
<body><div style="text-align:center"><h1>404 📷</h1><p>That page isn't here — <a href="/">back to the booth</a>.</p></div></body></html>
