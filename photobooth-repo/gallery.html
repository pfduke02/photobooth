<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext y='26' font-size='26'%3E%F0%9F%96%BC%3C/text%3E%3C/svg%3E" />
<title>Photobooth · Gallery</title>
<style>
  :root { --bg:#0e0f13; --panel:#171922; --ink:#f3f4f8; --muted:#9aa0b4; --accent:#e7c69b; --accent-2:#c98a6b; --radius:16px; --shadow:0 10px 40px rgba(0,0,0,.45); --font:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; }
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; background:radial-gradient(1200px 800px at 50% -10%,#1b1e2b 0%,var(--bg) 60%); color:var(--ink); font-family:var(--font); -webkit-font-smoothing:antialiased; }
  header { display:flex; align-items:center; gap:16px; padding:18px 24px; border-bottom:1px solid #22252f; flex-wrap:wrap; }
  header h1 { margin:0; font-size:18px; letter-spacing:.28em; text-transform:uppercase; font-weight:600; }
  header .sub { color:var(--muted); font-size:13px; }
  .spacer { flex:1; }
  a.link, .btn { font-family:var(--font); font-size:14px; font-weight:600; text-decoration:none; cursor:pointer; border:0; border-radius:10px; padding:9px 14px; background:#232634; color:var(--ink); }
  a.link:hover, .btn:hover { filter:brightness(1.14); }
  .btn.primary { background:linear-gradient(135deg,var(--accent),var(--accent-2)); color:#201a12; }
  main { padding:22px 24px 60px; max-width:1200px; margin:0 auto; }
  .empty { color:var(--muted); text-align:center; padding:60px 20px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:18px; }
  .card { background:var(--panel); border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow); cursor:pointer; border:1px solid #23262f; transition:transform .08s ease; }
  .card:hover { transform:translateY(-2px); }
  .card .strip { width:100%; aspect-ratio:1/2.2; object-fit:cover; display:block; background:#000; }
  .card .meta { padding:9px 11px; }
  .card .meta .d { font-size:12px; color:var(--ink); }
  .card .meta .s { font-size:11px; color:var(--muted); margin-top:2px; display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
  .badge { background:#262a38; color:var(--accent); border-radius:999px; padding:1px 7px; font-size:10px; }
  /* modal */
  .modal { position:fixed; inset:0; display:none; align-items:center; justify-content:center; background:rgba(4,5,8,.85); backdrop-filter:blur(6px); z-index:20; padding:20px; }
  .modal.show { display:flex; }
  .sheet { background:var(--panel); border-radius:var(--radius); box-shadow:var(--shadow); max-width:96vw; max-height:94vh; display:flex; gap:22px; padding:20px; overflow:auto; }
  .sheet img.big { max-height:82vh; border-radius:8px; box-shadow:0 8px 30px rgba(0,0,0,.5); }
  .side { min-width:260px; max-width:320px; display:flex; flex-direction:column; gap:12px; }
  .side h3 { margin:0; font-size:16px; }
  .kv { font-size:12px; color:var(--muted); line-height:1.7; }
  .kv b { color:var(--ink); font-weight:600; }
  .frames { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; }
  .frames img { width:100%; aspect-ratio:4/3; object-fit:cover; border-radius:6px; border:1px solid #2a2e3c; cursor:pointer; }
  .side .row { display:flex; gap:8px; flex-wrap:wrap; }
  .muted { color:var(--muted); font-size:12px; }
  #filters { display:flex; gap:10px; flex-wrap:wrap; align-items:center; padding:14px 24px 0; max-width:1200px; margin:0 auto; }
  .fsel { background:#232634; color:var(--ink); border:1px solid #303445; border-radius:10px; padding:8px 10px; font:600 13px var(--font); cursor:pointer; }
  #fFavLbl { display:inline-flex; align-items:center; gap:6px; color:var(--muted); font-size:13px; cursor:pointer; }
  #fCount { color:var(--muted); font-size:13px; margin-left:auto; }
</style>
</head>
<body>
  <header>
    <h1>Photobooth · Gallery</h1>
    <span class="sub" id="count"></span>
    <span class="spacer"></span>
    <span id="adminBadge" class="badge" style="display:none">admin</span>
    <button class="btn" id="gcBtn" style="display:none" title="Delete storage files that belong to no session">🧹 Clean orphans</button>
    <button class="btn" id="qrBtn" title="QR code for this gallery">📱 QR</button>
    <button class="btn" id="refresh">↻ Refresh</button>
    <a class="link" href="./">← Back to booth</a>
  </header>
  <div id="filters">
    <select id="fTheme" class="fsel"><option value="">Theme: all</option></select>
    <select id="fBg" class="fsel"><option value="">Background: all</option></select>
    <select id="fAi" class="fsel"><option value="">AI: all</option><option value="on">AI: on</option><option value="off">AI: off</option></select>
    <select id="fShots" class="fsel"><option value="">Shots: all</option><option value="3">3 shots</option><option value="4">4 shots</option></select>
    <select id="fProp" class="fsel"><option value="">Prop: all</option></select>
    <label id="fFavLbl"><input type="checkbox" id="fFav" /> ♥ favorites only</label>
    <input type="text" id="fText" class="fsel" placeholder="🔎 search notes, tags, id…" style="min-width:180px" />
    <input type="date" id="fFrom" class="fsel" title="From date" />
    <input type="date" id="fTo" class="fsel" title="To date" />
    <span id="fCount"></span>
  </div>
  <main>
    <div id="grid" class="grid"></div>
    <div id="empty" class="empty" style="display:none"></div>
  </main>

  <div class="modal" id="modal">
    <div class="sheet">
      <img class="big" id="mStrip" alt="strip" />
      <div class="side">
        <h3 id="mTitle">Session</h3>
        <div class="kv" id="mMeta"></div>
        <div class="row">
          <a class="btn primary" id="mDownload" download>⬇ Strip PNG</a>
          <button class="btn" id="mSheet">⬇ Contact sheet</button>
          <button class="btn" id="mPrint" title="Two copies of this strip on one 4×6 sheet — the format photo printers (e.g. Canon SELPHY) cut in half">🖨 4×6 print sheet</button>
        </div>
        <div class="muted">Original frames (click to download):</div>
        <div class="frames" id="mFrames"></div>
        <video id="mBoom" controls loop muted autoplay playsinline style="display:none; width:100%; border-radius:8px;"></video>
        <div id="adminBox" style="display:none; border-top:1px solid #262a38; padding-top:10px; display:none; flex-direction:column; gap:8px;">
          <div class="muted" style="letter-spacing:.1em; text-transform:uppercase;">Admin</div>
          <div class="row">
            <button class="btn" id="aFav">♡ Favorite</button>
            <button class="btn" id="aDelete" style="color:var(--danger)">🗑 Delete</button>
          </div>
          <input id="aTags" placeholder="tags, comma, separated" style="background:#0e0f16;border:1px solid #2a2e3c;color:var(--ink);border-radius:10px;padding:8px 10px;font:600 13px var(--font);" />
          <textarea id="aNote" placeholder="note…" rows="2" style="background:#0e0f16;border:1px solid #2a2e3c;color:var(--ink);border-radius:10px;padding:8px 10px;font:500 13px var(--font);resize:vertical;"></textarea>
          <div class="row"><button class="btn primary" id="aSave">Save</button></div>
        </div>
        <div class="row"><button class="btn" id="mClose">Close</button></div>
      </div>
    </div>
  </div>

<script src="assets/qrcode.js?v=2.0"></script>
<script>
const $ = (s)=>document.querySelector(s);
let sessions = [];

// Cloud gallery: reads sessions from Supabase. Add ?local=1 to the URL to read
// the local server's /api/sessions instead.
const CLOUD = {
  enabled: true,
  url: "https://xjnqnxorqhobikyzshrt.supabase.co",
  anonKey: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhqbnFueG9ycWhvYmlreXpzaHJ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ0NDkyMjUsImV4cCI6MjEwMDAyNTIyNX0.ihY85rnHCWyg7MknipFU9_bI2syCPYbwpQurVIe0scA",
  bucket: "sessions",
};
const USE_CLOUD = CLOUD.enabled && !new URLSearchParams(location.search).has("local");
const pubUrl = (p)=>`${CLOUD.url}/storage/v1/object/public/${CLOUD.bucket}/${p}`;

/* Admin mode: open gallery.html?admin=<key> once — the key is stored locally,
   the URL is cleaned, and edit/delete controls appear. The key is checked
   server-side by the 'admin' Edge Function; guests never see these controls. */
const AKEY_LS="pb.adminKey";
const _ak=new URLSearchParams(location.search).get("admin");
if(_ak!==null){
  try{ if(_ak==="off") localStorage.removeItem(AKEY_LS); else localStorage.setItem(AKEY_LS,_ak); }catch{}
  const keep=new URLSearchParams(location.search).has("local")?"?local=1":"";
  history.replaceState(null,"",location.pathname+keep);
}
let ADMIN_KEY=null; try{ ADMIN_KEY=localStorage.getItem(AKEY_LS); }catch{}
const IS_ADMIN = !!ADMIN_KEY && USE_CLOUD;
async function adminCall(payload){
  const res=await fetch(`${CLOUD.url}/functions/v1/admin`,{ method:"POST",
    headers:{ "Content-Type":"application/json", apikey:CLOUD.anonKey, Authorization:"Bearer "+CLOUD.anonKey, "x-admin-key":ADMIN_KEY },
    body:JSON.stringify(payload) });
  const data=await res.json().catch(()=>({ok:false,error:"bad response"}));
  if(!res.ok||!data.ok) throw new Error(data.error||("HTTP "+res.status));
  return data;
}
let gtoastT=null;
function gtoast(msg){
  let t=$("#gtoast");
  if(!t){ t=document.createElement("div"); t.id="gtoast"; t.style.cssText="position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#1b1e2b;color:#f3f4f8;border:1px solid #303445;padding:11px 16px;border-radius:12px;max-width:min(520px,92vw);font:600 13px var(--font);z-index:70;box-shadow:0 10px 40px rgba(0,0,0,.5);pointer-events:none"; document.body.appendChild(t); }
  t.textContent=msg; t.style.opacity="1"; clearTimeout(gtoastT); gtoastT=setTimeout(()=>{ t.style.transition="opacity .4s"; t.style.opacity="0"; },3800);
}

function fmtDate(iso){
  if(!iso) return "unknown date";
  try { return new Date(iso).toLocaleString(undefined,{month:"short",day:"numeric",year:"numeric",hour:"numeric",minute:"2-digit"}); }
  catch { return iso; }
}

async function load(){
  if(USE_CLOUD){
    try {
      const res = await fetch(`${CLOUD.url}/rest/v1/sessions?select=*&order=created_at.desc`, { headers:{ apikey:CLOUD.anonKey, Authorization:"Bearer "+CLOUD.anonKey } });
      if(!res.ok) throw new Error("HTTP "+res.status);
      const rows = await res.json();
      sessions = rows.map(r=>({ id:r.id, createdAt:r.created_at, numPhotos:r.num_photos, background:r.background,
        stripTheme:r.strip_theme||null, aiEnabled:r.ai_enabled, favorite:!!r.favorite, tags:r.tags||[], note:r.note||"",
        prop:(r.meta&&r.meta.prop)||null, meta:r.meta||{},
        strip:r.strip_path?pubUrl(r.strip_path):null, frames:(r.frame_paths||[]).map(pubUrl),
        boomerang:(r.meta&&r.meta.boomerangPath)?pubUrl(r.meta.boomerangPath):null }));
    } catch(e){ return showEmpty("Can't reach the cloud gallery (network?). It reads from your Supabase project."); }
  } else {
    try {
      const data = await (await fetch("api/sessions",{cache:"no-store"})).json();
      sessions = ((data && data.sessions) || []).map(s=>({ ...s,
        stripTheme:(s.meta&&s.meta.stripTheme)||null,
        aiEnabled:s.meta?!!s.meta.aiEnabled:null,
        prop:(s.meta&&s.meta.prop)||null,
        favorite:!!(s.meta&&s.meta.favorite), tags:(s.meta&&s.meta.tags)||[], note:(s.meta&&s.meta.note)||"" }));
    }
    catch(e){ return showEmpty("Can't reach the local collection server. Start it with <code>node server.mjs</code> and open http://localhost:8099/gallery.html?local=1."); }
  }
  $("#count").textContent = sessions.length ? `${sessions.length} session${sessions.length>1?"s":""}` : "";
  buildFilterOptions();
  applyFilters();
}

/* ---- filters (client-side — wedding-scale data, instant) ---- */
let view = [];
function buildFilterOptions(){
  const fill=(sel, values, label)=>{
    const cur=sel.value;
    sel.innerHTML=`<option value="">${label}: all</option>`+[...new Set(values.filter(Boolean))].sort()
      .map(v=>`<option value="${v}">${label}: ${v}</option>`).join("");
    sel.value=cur;
  };
  fill($("#fTheme"), sessions.map(s=>s.stripTheme), "Theme");
  fill($("#fBg"),    sessions.map(s=>s.background), "Background");
  fill($("#fProp"),  sessions.map(s=>s.prop&&s.prop!=="none"?s.prop:null), "Prop");
}
function applyFilters(){
  const th=$("#fTheme").value, bg=$("#fBg").value, ai=$("#fAi").value,
        ns=$("#fShots").value, fav=$("#fFav").checked, pr=$("#fProp").value;
  const from=$("#fFrom").value, to=$("#fTo").value;
  const tx=$("#fText").value.trim().toLowerCase();
  const hay=(s)=>[s.id, s.note, (s.tags||[]).join(" "), s.stripTheme, s.background, s.prop,
                  s.meta&&s.meta.restyle, s.meta&&(s.meta.propShots||[]).join(" ")]
                 .filter(Boolean).join(" ").toLowerCase();
  view = sessions.filter(s=>
    (!th || s.stripTheme===th) &&
    (!bg || s.background===bg) &&
    (!pr || s.prop===pr) &&
    (!tx || hay(s).includes(tx)) &&
    (!ai || (ai==="on" ? s.aiEnabled===true : s.aiEnabled===false)) &&
    (!ns || String(s.numPhotos)===ns) &&
    (!fav || s.favorite) &&
    (!from || String(s.createdAt||"").slice(0,10) >= from) &&
    (!to   || String(s.createdAt||"").slice(0,10) <= to));
  $("#fCount").textContent = sessions.length ? `showing ${view.length} of ${sessions.length}` : "";
  render();
}
function showEmpty(html){ $("#grid").innerHTML=""; const e=$("#empty"); e.style.display="block"; e.innerHTML=html; }

function render(){
  const grid=$("#grid"), empty=$("#empty");
  if(!sessions.length){ return showEmpty("No sessions yet — take some photos in the booth and they'll appear here."); }
  if(!view.length){ grid.innerHTML=""; empty.style.display="block"; empty.textContent="No sessions match these filters."; return; }
  empty.style.display="none"; grid.innerHTML="";
  view.forEach((s,i)=>{
    const card=document.createElement("div"); card.className="card";
    const bits=[];
    if(s.stripTheme) bits.push(`<span class="badge">${s.stripTheme}</span>`);
    if(s.background && s.background!=="none") bits.push(`<span class="badge">${s.background}</span>`);
    if(s.prop && s.prop!=="none") bits.push(`<span class="badge">${s.prop==="crown"?"👑":s.prop==="tophat"?"🎩":s.prop==="glasses"?"🕶":s.prop==="flowers"?"🌸":s.prop==="bowtie"?"🎀":s.prop==="hearts"?"😍":"🎲"} ${s.prop}</span>`);
    if(s.meta&&s.meta.restyle&&s.meta.restyle!=="none") bits.push(`<span class="badge">🎨 ${s.meta.restyle}</span>`);
    if(s.favorite) bits.push(`<span class="badge">♥</span>`);
    card.innerHTML = `<img class="strip" loading="lazy" src="${s.strip||""}" alt="${s.id}" />
      <div class="meta"><div class="d">${fmtDate(s.createdAt)}</div>
      <div class="s">${s.numPhotos} shots ${bits.join(" ")}</div></div>`;
    card.addEventListener("click",()=>openDetail(i));
    grid.appendChild(card);
  });
}

function openDetail(i){
  const s=view[i];
  $("#mStrip").src = s.strip||"";
  $("#mTitle").textContent = s.id;
  $("#mMeta").innerHTML = `<div><b>When:</b> ${fmtDate(s.createdAt)}</div>
    <div><b>Shots:</b> ${s.numPhotos}</div>
    <div><b>Theme:</b> ${s.stripTheme||"—"}</div>
    <div><b>Background:</b> ${s.background||"none"}</div>
    <div><b>AI:</b> ${s.aiEnabled===true?"on":s.aiEnabled===false?"off":"—"}</div>
    ${s.prop&&s.prop!=="none"?`<div><b>Prop:</b> ${s.prop}${s.prop==="surprise"&&s.meta&&s.meta.propShots?` (${s.meta.propShots.join(", ")})`:""}</div>`:""}
    ${s.meta&&s.meta.restyle&&s.meta.restyle!=="none"?`<div><b>Restyle:</b> 🎨 ${s.meta.restyle}${s.meta.restyleMs?` (${s.meta.restyleMs} ms)`:""}</div>`:""}
    ${s.tags&&s.tags.length?`<div><b>Tags:</b> ${s.tags.join(", ")}</div>`:""}
    ${s.note?`<div><b>Note:</b> ${s.note}</div>`:""}
    <div><b>Folder:</b> sessions/${s.id}/</div>`;
  const dl=$("#mDownload"); dl.href=s.strip||"#"; dl.download=`${s.id}_strip.png`;
  const fr=$("#mFrames"); fr.innerHTML="";
  s.frames.forEach((f,idx)=>{ const im=document.createElement("img"); im.src=f; im.title=`frame-${idx+1}`; im.addEventListener("click",()=>downloadUrl(f,`${s.id}_frame-${idx+1}.jpg`)); fr.appendChild(im); });
  $("#mSheet").onclick=()=>contactSheet(s);
  $("#mPrint").onclick=()=>printSheet(s);
  const mb=$("#mBoom");
  if(s.boomerang){ mb.src=s.boomerang; mb.style.display=""; } else { mb.removeAttribute("src"); mb.style.display="none"; }
  const ab=$("#adminBox");
  if(IS_ADMIN){
    ab.style.display="flex";
    const favBtn=$("#aFav");
    favBtn.textContent = s.favorite ? "♥ Favorited" : "♡ Favorite";
    favBtn.onclick=async()=>{ try{ await adminCall({action:"update", id:s.id, favorite:!s.favorite}); s.favorite=!s.favorite; favBtn.textContent=s.favorite?"♥ Favorited":"♡ Favorite"; gtoast(s.favorite?"Favorited ♥":"Unfavorited"); applyFilters(); }catch(e){ gtoast("Update failed: "+e.message); } };
    $("#aTags").value=(s.tags||[]).join(", ");
    $("#aNote").value=s.note||"";
    $("#aSave").onclick=async()=>{
      const tags=$("#aTags").value.split(",").map(t=>t.trim()).filter(Boolean);
      const note=$("#aNote").value;
      try{ await adminCall({action:"update", id:s.id, tags, note}); s.tags=tags; s.note=note; gtoast("Saved ✓"); applyFilters(); }catch(e){ gtoast("Save failed: "+e.message); }
    };
    const del=$("#aDelete");
    del.textContent="🗑 Delete"; del.dataset.armed="";
    del.onclick=async()=>{
      if(!del.dataset.armed){ del.dataset.armed="1"; del.textContent="⚠ Really delete? tap again"; setTimeout(()=>{ del.dataset.armed=""; del.textContent="🗑 Delete"; },4000); return; }
      try{ await adminCall({action:"delete", id:s.id}); sessions=sessions.filter(x=>x.id!==s.id); closeDetail(); buildFilterOptions(); applyFilters(); gtoast("Deleted "+s.id+" (files + record)"); }
      catch(e){ gtoast("Delete failed: "+e.message); }
    };
  } else { ab.style.display="none"; }
  $("#modal").classList.add("show");
}
function closeDetail(){ $("#modal").classList.remove("show"); }

function downloadUrl(url,name){ const a=document.createElement("a"); a.href=url; a.download=name||"download"; document.body.appendChild(a); a.click(); a.remove(); }

// Compose the original frames side-by-side into one PNG (a contact sheet).
async function contactSheet(s){
  if(!s.frames.length) return;
  const imgs=await Promise.all(s.frames.map(src=>new Promise((res,rej)=>{ const im=new Image(); im.crossOrigin="anonymous"; im.onload=()=>res(im); im.onerror=rej; im.src=src; })));
  const fw=imgs[0].naturalWidth, fh=imgs[0].naturalHeight, pad=20, gap=14;
  const c=document.createElement("canvas");
  c.width = pad*2 + imgs.length*fw + (imgs.length-1)*gap; c.height = pad*2 + fh;
  const ctx=c.getContext("2d"); ctx.fillStyle="#ffffff"; ctx.fillRect(0,0,c.width,c.height);
  imgs.forEach((im,i)=>ctx.drawImage(im, pad + i*(fw+gap), pad, fw, fh));
  c.toBlob((b)=>{ const u=URL.createObjectURL(b); downloadUrl(u,`${s.id}_contact-sheet.png`); setTimeout(()=>URL.revokeObjectURL(u),4000); }, "image/png");
}

/* 4×6" @300dpi print sheet (1200×1800): TWO copies of the strip side by side
   with a dashed cut line — the standard photobooth print format (a Canon
   SELPHY or any 4×6 photo printer prints it; cut down the middle, keep one,
   give one away). Strips are print-true 2×6" already, so this is lossless. */
async function printSheet(s){
  if(!s.strip) return;
  try{
    const im=await new Promise((res,rej)=>{ const i=new Image(); i.crossOrigin="anonymous"; i.onload=()=>res(i); i.onerror=()=>rej(new Error("couldn't load the strip image")); i.src=s.strip; });
    const c=document.createElement("canvas"); c.width=1200; c.height=1800;
    const ctx=c.getContext("2d"); ctx.fillStyle="#ffffff"; ctx.fillRect(0,0,1200,1800);
    ctx.imageSmoothingQuality="high";
    ctx.drawImage(im,0,0,600,1800); ctx.drawImage(im,600,0,600,1800);
    ctx.strokeStyle="rgba(0,0,0,.25)"; ctx.setLineDash([12,10]); ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(600,0); ctx.lineTo(600,1800); ctx.stroke();
    const du=c.toDataURL("image/png");
    window.__PBG_lastPrint={ w:c.width, h:c.height, bytes:du.length };
    downloadUrl(du, `${s.id}_print-4x6.png`);
  }catch(e){ gtoast("Print sheet failed: "+(e.message||e)); }
}
window.__PBG={ printSheet:(i)=>printSheet(view[i||0]) };

$("#refresh").addEventListener("click", load);
["fTheme","fBg","fAi","fShots","fProp","fFrom","fTo"].forEach(id=>$("#"+id).addEventListener("change", applyFilters));
$("#fText").addEventListener("input", applyFilters);
$("#fFav").addEventListener("change", applyFilters);
if(IS_ADMIN){
  $("#adminBadge").style.display="";
  $("#gcBtn").style.display="";
  $("#gcBtn").addEventListener("click", async()=>{
    try{ const r=await adminCall({action:"gc"}); gtoast(`Cleaned ${r.removedFiles} file(s) in ${r.removedPrefixes.length} orphan folder(s)`); }
    catch(e){ gtoast("Cleanup failed: "+e.message); }
  });
}
$("#qrBtn").addEventListener("click", ()=>{
  if(typeof qrcode==="undefined") return;
  const url=location.origin+location.pathname;
  let m=$("#qrOverlay");
  if(!m){
    m=document.createElement("div"); m.id="qrOverlay";
    m.style.cssText="position:fixed;inset:0;z-index:60;display:flex;align-items:center;justify-content:center;background:rgba(4,5,8,.85);backdrop-filter:blur(6px);cursor:pointer";
    m.innerHTML='<div style="background:#fff;border-radius:16px;padding:22px;text-align:center;max-width:min(86vw,380px)"><img id="qrImg" alt="QR" style="width:min(64vw,300px);image-rendering:pixelated"/><div id="qrTxt" style="font:600 13px system-ui;color:#222;word-break:break-all;margin-top:10px"></div><div style="font:12px system-ui;color:#888;margin-top:6px">Scan with a phone camera · tap anywhere to close</div></div>';
    m.addEventListener("click",()=>m.remove());
    document.body.appendChild(m);
  }
  const qr=qrcode(0,"M"); qr.addData(url); qr.make();
  m.querySelector("#qrImg").src=qr.createDataURL(8,16);
  m.querySelector("#qrTxt").textContent=url;
});
$("#mClose").addEventListener("click", closeDetail);
$("#modal").addEventListener("click",(e)=>{ if(e.target===$("#modal")) closeDetail(); });
document.addEventListener("keydown",(e)=>{ if(e.key==="Escape") closeDetail(); });
load();
</script>
</body>
